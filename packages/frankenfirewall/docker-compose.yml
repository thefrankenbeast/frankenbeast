version: "3.9"

services:
  firewall:
    build: .
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - FIREWALL_PORT=3000
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
